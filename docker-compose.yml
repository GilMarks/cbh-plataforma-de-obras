services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cbh_db
      POSTGRES_USER: cbh
      POSTGRES_PASSWORD: cbh
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbh -d cbh_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cbh:cbh@db:5432/cbh_db
      SECRET_KEY: dev-secret-key-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
